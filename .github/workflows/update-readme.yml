name: Update README

on:
  push:
    paths:
      - "hosts/**"         # Trigger when files in the hosts directory change
      - "flake.nix"        # Trigger when flake.nix changes
      - "README.md"        # Trigger manual updates to README.md

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      # Step 3: Install dependencies (if any, e.g., tree)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tree

      # Step 4: Run the README update script
      - name: Run update script
        run: python3 script.py # Replace script.py with the path to your script

      # Step 5: Commit and push changes
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README.md via GitHub Actions" || echo "No changes to commit"
          git push
